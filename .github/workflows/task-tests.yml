name: Task Tests (Task-1/2/3)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  status:
  workflow_dispatch:

jobs:
  run-task-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all task tests (Task-1, Task-2, Task-3)
        run: |
          pytest -q tests/test_extractor.py tests/test_comparator.py tests/test_executor.py
